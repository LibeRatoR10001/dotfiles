#Import
import = [
    "~/.config/alacritty/themes/themes/dracula.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 16.0

[font.bold]
family = "Monaspace Neon Var"
style = "Bold"

[font.bold_italic]
family = "MonaspiceNe Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "Monaspace Neon Var"
style = "Italic"

[font.normal]
family = "MonaspiceNe Nerd Font Mono"
style = "Regular"

[window]
dimensions = { columns = 96, lines = 26 }

padding = { x = 0, y = 0 }

dynamic_padding = false

decorations = "Full"

opacity = 0.7

blur = true

startup_mode = "Windowed"

dynamic_title = true

class = { instance = "Alacritty", general = "Alacritty" }

decorations_theme_variant = "None"

resize_increments = false

option_as_alt = "None"
